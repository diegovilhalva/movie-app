[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install", "npm run build"]

[phases.deploy]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"